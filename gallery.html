<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css.css">

</head>

<body>
    <header>
        <a href="index.html">
            <img src="photosandblogs/banner.png">
        </a>
    </header>

    <div id="gallerySection" class="gallery"></div>

    <script>
    fetch("photosandblogs/photolist.json")
        .then(file => file.json())
            .then(list => {
                list.forEach(photo => {
                    const section = document.createElement("div")
                    section.classList.add("section")

                    const clickable = document.createElement("a")
                    clickable.href = "photosandblogs/" + photo.file

                    const title = document.createElement("h2")
                    title.textContent = photo.title
                    clickable.appendChild(title)

                    const date = document.createElement("p")
                    date.textContent = photo.DOR
                    clickable.appendChild(date)

                    const image = document.createElement("img")
                    image.src = "photosandblogs/" + photo.file
                    clickable.appendChild(image)

                    section.appendChild(clickable)

                    document.getElementById("gallerySection").appendChild(section)
                })
            })
      
    </script>
</body>
</html>
