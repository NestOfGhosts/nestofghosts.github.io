<!DOCTYPE html>
<html>
<head>
    <title>Blog</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <header>
        <img src="photosandblogs/banner.png">
    </header>

    <div id="blog-container">
    
    </div>
    <script>
        const db = window.supabase.createClient("https://mekxwqreqqmdhziicjpw.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1la3h3cXJlcXFtZGh6aWljanB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzU3MTEsImV4cCI6MjA5NTE1MTcxMX0.Nc9hUZLJBGpH75VbvQYB4vkT-JUQfe5FRbDOVFV6TPM")
        db.from("Comments").select("*").then(result => console.log(result))


        
        fetch("photosandblogs/index.json") 
            .then(response => response.json())
                .then(postlist => {
                const promises = postlist.map(filename =>
                    fetch("photosandblogs/" + filename)
                        .then(response => response.text())
                )
                    
                Promise.all(promises).then(posts => {
                    postlist.forEach((filename, index) => {
                        const text = posts[index]
                        const post = document.createElement("div")
                        post.classList.add("posts")
                        post.innerHTML = marked.parse(text)

                        const commentSection = document.createElement("div")
                        commentSection.classList.add("commentSection")

                        const hideButton = document.createElement("button")
                        hideButton.innerHTML = "Click to toggle comments"

                        const usernameInput = document.createElement("input")
                        usernameInput.placeholder = "Username"
                        usernameInput.value = localStorage.getItem("username")

                        const commentInput = document.createElement("input")
                        commentInput.placeholder = "Comment"

                        const submit = document.createElement("button")
                        submit.innerHTML = "Submit"

                        const spacer = document.createElement("br")

                        const form = document.createElement("div")

                        hideButton.onclick = () => {
                            if (commentSection.style.display === "none") {
                                commentSection.style.display = "block"
                            } 
                            else {
                                commentSection.style.display = "none"
                            }
                        }
                        post.appendChild(hideButton)
                        commentSection.appendChild(spacer)
                        commentSection.appendChild(usernameInput)
                        commentSection.appendChild(commentInput)
                        commentSection.appendChild(submit)

                        db.from("Comments").select("*").eq("post", filename).order('created_at', { ascending: true })
                            .then(result => {
                                result.data.forEach(comments => {
                                    const comment = document.createElement("div")
                                    comment.innerHTML += comments.username + "<br>"   
                                    comment.innerHTML += new Date(comments.created_at).toLocaleString() + "<br>"  
                                    comment.innerHTML += comments.comment + "<br><br>"
                                    commentSection.appendChild(comment)
                            })
                        })

                        post.appendChild(commentSection)

                        document.getElementById("blog-container").appendChild(post)
                    
                



                                submit.onclick = () => {
                                    db.from("Comments").insert({
                                        post: filename,
                                        username: usernameInput.value,
                                        comment: commentInput.value,
                                        likes: 0
                                        }).then(() => {
                                            const newComment = document.createElement("div")
                                            newComment.innerHTML += usernameInput.value  
                                            newComment.innerHTML += "<br>" + new Date().toLocaleString() 
                                            newComment.innerHTML += "<br>" + commentInput.value
                                            
                                            post.appendChild(newComment)
                                        }).then(() => {
                                            commentInput.value = "",
                                            localStorage.setItem("username", usernameInput.value)
                                        })
                                }
                            })
                            })
                        })

        

    </script>
</body>
</html>
